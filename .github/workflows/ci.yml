name: Backend CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gitops-backend:${{ github.sha }}

      - name: Update Kubernetes manifests
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Gitops-prasad/gitops-manifests.git
          cd gitops-manifests
          sed -i "s|image: .*gitops-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/gitops-backend:${{ github.sha }}|g" backend.yaml
          git add backend.yaml
          git commit -m "Update backend image to ${{ github.sha }}"
          git push
